name: Get Citation Data

on:
  page_build:
  schedule:
    - cron: "0 8 1 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: google-scholar-crawler
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout previous citation data
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: google-scholar-stats
          path: google_scholar_crawler/previous_results

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: google_scholar_crawler/requirements.txt

      - name: Install requirements
        run: python -m pip install --disable-pip-version-check -r google_scholar_crawler/requirements.txt

      - name: Fetch Google Scholar citation data
        run: python google_scholar_crawler/main.py
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
          GOOGLE_SCHOLAR_FALLBACK_JSON: google_scholar_crawler/previous_results/gs_data.json
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}

      - name: Publish citation data branch
        working-directory: google_scholar_crawler/results
        run: |
          git init --initial-branch=google-scholar-stats
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git add *.json
          git commit -m "Updated Citation Data"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:google-scholar-stats --force
        env:
          GITHUB_TOKEN: ${{ github.token }}
