name: Update github myprofile

on:
  page_build:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: update-github-myprofile
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout site repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate profile README
        run: python github_myprofile_updater/update.py

      - name: Validate profile repository token
        run: |
          if [ -z "${GHRS_GITHUB_API_TOKEN}" ]; then
            echo "::error::Set GHRS_GITHUB_API_TOKEN to a PAT with Contents read/write access to yinjiewang/yinjiewang."
            exit 1
          fi
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GHRS_GITHUB_API_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/yinjiewang/yinjiewang > repo.json
          python -c "import json, sys; permissions = json.load(open('repo.json', encoding='utf-8')).get('permissions', {}); print('Token permissions:', permissions); sys.exit(0 if permissions.get('push') else 1)" || {
            echo "::error::GHRS_GITHUB_API_TOKEN can read yinjiewang/yinjiewang, but it does not have push permission. Recreate it with Contents: Read and write for yinjiewang/yinjiewang."
            exit 1
          }
        env:
          GHRS_GITHUB_API_TOKEN: ${{ secrets.GHRS_GITHUB_API_TOKEN }}

      - name: Checkout profile repository
        uses: actions/checkout@v4
        with:
          repository: yinjiewang/yinjiewang
          token: ${{ secrets.GHRS_GITHUB_API_TOKEN }}
          path: github_profile_repo
          persist-credentials: false

      - name: Verify profile repository push access
        env:
          GHRS_GITHUB_API_TOKEN: ${{ secrets.GHRS_GITHUB_API_TOKEN }}
        run: |
          cd github_profile_repo
          git remote set-url origin "https://x-access-token:${GHRS_GITHUB_API_TOKEN}@github.com/yinjiewang/yinjiewang.git"
          git ls-remote --exit-code origin main
          if ! git push --dry-run origin HEAD:main; then
            echo "::error::GHRS_GITHUB_API_TOKEN cannot push to yinjiewang/yinjiewang main. Create a new PAT owned by yinjiewang, select repository yinjiewang/yinjiewang, and grant Repository permissions > Contents: Read and write."
            exit 1
          fi

      - name: Update profile repository
        env:
          GHRS_GITHUB_API_TOKEN: ${{ secrets.GHRS_GITHUB_API_TOKEN }}
        run: |
          cp github_myprofile_updater/README.md github_profile_repo/README.md
          mkdir -p github_profile_repo/images
          cp -R github_myprofile_updater/images/. github_profile_repo/images/
          cd github_profile_repo
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GHRS_GITHUB_API_TOKEN}@github.com/yinjiewang/yinjiewang.git"
          git add README.md images
          if git diff --cached --quiet; then
            echo "No profile changes to commit."
            exit 0
          fi
          git commit -m "Update profile README"
          git push origin HEAD:main
